<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Tim Sullivan public review command deck</title>
  <desc id="desc">A premium profile banner showing product systems, proof routes, tests, demos, coverage, packets, and public artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111c"/><stop offset=".52" stop-color="#0b263c"/><stop offset="1" stop-color="#0f4b4a"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fbfdf8"/><stop offset="1" stop-color="#e8f2f4"/></linearGradient>
    <pattern id="grid" width="58" height="58" patternUnits="userSpaceOnUse"><path d="M58 0H0v58" fill="none" stroke="#fff" stroke-opacity=".06"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="26" stdDeviation="22" flood-color="#000" flood-opacity=".30"/></filter>
  </defs>
  <rect width="1400" height="560" rx="44" fill="url(#bg)"/>
  <rect x="28" y="28" width="1344" height="504" rx="34" fill="url(#grid)"/>
  <circle cx="1180" cy="90" r="190" fill="#6fffe8" opacity=".12"/>
  <circle cx="230" cy="470" r="180" fill="#2f6bff" opacity=".10"/>
  <text x="76" y="92" fill="#6fffe8" font-family="Inter, Arial" font-size="15" font-weight="950" letter-spacing="5">PUBLIC REVIEW DECK</text>
  <text x="76" y="158" fill="#f8fbff" font-family="Inter, Arial" font-size="56" font-weight="900">Product systems that can be inspected.</text>
  <text x="76" y="205" fill="#c7d4db" font-family="Inter, Arial" font-size="24">Mobile product logic · evidence workflows · validation gates · generated artifacts</text>
  <g font-family="Inter, Arial" filter="url(#shadow)">
    <g transform="translate(76 278)"><rect width="286" height="154" rx="28" fill="url(#card)"/><text x="28" y="50" fill="#c36b1e" font-size="13" font-weight="950" letter-spacing="4">PUBLIC TESTS</text><text x="28" y="110" fill="#07111c" font-size="58" font-weight="950">43</text></g>
    <g transform="translate(400 278)"><rect width="286" height="154" rx="28" fill="url(#card)"/><text x="28" y="50" fill="#c36b1e" font-size="13" font-weight="950" letter-spacing="4">REVIEW ROUTE</text><text x="28" y="98" fill="#07111c" font-size="34" font-weight="900">Demo → Lab</text><text x="28" y="130" fill="#526170" font-size="19">then examples + coverage</text></g>
    <g transform="translate(724 278)"><rect width="286" height="154" rx="28" fill="url(#card)"/><text x="28" y="50" fill="#c36b1e" font-size="13" font-weight="950" letter-spacing="4">ARTIFACTS</text><text x="28" y="96" fill="#07111c" font-size="34" font-weight="900">PDF packet</text><text x="28" y="130" fill="#526170" font-size="19">ADRs · CI · sample outputs</text></g>
    <g transform="translate(1048 278)"><rect width="276" height="154" rx="28" fill="#07111c" stroke="#6fffe8" stroke-opacity=".28"/><text x="28" y="50" fill="#6fffe8" font-size="13" font-weight="950" letter-spacing="4">SYSTEM EDGE</text><text x="28" y="96" fill="#f8fbff" font-size="34" font-weight="900">Claims route</text><text x="28" y="130" fill="#c7d4db" font-size="19">to public evidence</text></g>
  </g>
</svg>
