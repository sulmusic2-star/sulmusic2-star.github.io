<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Architecture proof wall</title>
  <desc id="desc">A high-contrast proof wall combining ADRs, CI, coverage, demos, source boundaries, and artifact outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111c"/><stop offset=".5" stop-color="#10263c"/><stop offset="1" stop-color="#0f4b4a"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff" stop-opacity=".96"/><stop offset="1" stop-color="#e3eef6" stop-opacity=".88"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="26" stdDeviation="24" flood-color="#000" flood-opacity=".32"/></filter>
    <pattern id="grid" width="70" height="70" patternUnits="userSpaceOnUse"><path d="M70 0H0v70" fill="none" stroke="#fff" stroke-opacity=".055"/></pattern>
  </defs>
  <rect width="1400" height="820" rx="48" fill="url(#bg)"/>
  <rect x="30" y="30" width="1340" height="760" rx="38" fill="url(#grid)"/>
  <text x="86" y="98" fill="#66f2dc" font-family="Inter, Arial" font-size="16" font-weight="950" letter-spacing="5">PUBLIC PROOF WALL</text>
  <text x="86" y="150" fill="#f8fbff" font-family="Inter, Arial" font-size="48" font-weight="900">Architecture that can be inspected.</text>
  <g font-family="Inter, Arial" filter="url(#s)">
    <g transform="translate(84 214)"><rect width="370" height="214" rx="30" fill="url(#glass)"/><text x="30" y="54" fill="#b16d1c" font-size="14" font-weight="950" letter-spacing="4">DECISIONS</text><text x="30" y="104" fill="#0b1320" font-size="35" font-weight="900">ADR-backed tradeoffs</text><path d="M32 146h284M32 176h230" stroke="#10263c" stroke-opacity=".18" stroke-width="10" stroke-linecap="round"/></g>
    <g transform="translate(500 214)"><rect width="272" height="214" rx="30" fill="url(#glass)"/><text x="30" y="54" fill="#b16d1c" font-size="14" font-weight="950" letter-spacing="4">TESTS</text><text x="30" y="128" fill="#0b1320" font-size="76" font-weight="950">43</text><text x="30" y="170" fill="#526274" font-size="22">passing checks</text></g>
    <g transform="translate(816 214)"><rect width="500" height="214" rx="30" fill="url(#glass)"/><text x="30" y="54" fill="#b16d1c" font-size="14" font-weight="950" letter-spacing="4">VALIDATION</text><text x="30" y="104" fill="#0b1320" font-size="35" font-weight="900">untrusted input meets gates</text><g transform="translate(32 138)" stroke-width="8" stroke-linecap="round"><path d="M0 28h64" stroke="#23c5a8"/><path d="M94 28h64" stroke="#ffb84f"/><path d="M188 28h64" stroke="#5d87ff"/><path d="M282 28h124" stroke="#23c5a8"/></g></g>
    <g transform="translate(102 502)"><rect width="540" height="214" rx="30" fill="url(#glass)"/><text x="30" y="54" fill="#b16d1c" font-size="14" font-weight="950" letter-spacing="4">BOUNDARIES</text><text x="30" y="100" fill="#0b1320" font-size="30" font-weight="900">what the system</text><text x="30" y="135" fill="#0b1320" font-size="30" font-weight="900">refuses to fake</text><text x="30" y="170" fill="#526274" font-size="19">risk flags · caution states · source limits</text><rect x="30" y="172" width="156" height="18" rx="9" fill="#ffe8a8"/><rect x="204" y="172" width="118" height="18" rx="9" fill="#c7f7ea"/></g>
    <g transform="translate(684 502)"><rect width="616" height="214" rx="30" fill="url(#glass)"/><text x="30" y="54" fill="#b16d1c" font-size="14" font-weight="950" letter-spacing="4">DELIVERY</text><text x="30" y="98" fill="#0b1320" font-size="30" font-weight="900">proof that travels</text><text x="30" y="133" fill="#0b1320" font-size="30" font-weight="900">without private code</text><text x="30" y="170" fill="#526274" font-size="19">case studies · CI · coverage · sample artifacts</text><g transform="translate(30 184)"><circle cx="9" cy="9" r="9" fill="#23c5a8"/><circle cx="45" cy="9" r="9" fill="#5d87ff"/><circle cx="81" cy="9" r="9" fill="#ffb84f"/></g></g>
  </g>
</svg>
