<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Architecture proof wall</title>
  <desc id="desc">Decision records, tests, demos, and packet artifacts arranged as proof panels.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#132f53"/><stop offset="1" stop-color="#1f6f68"/></linearGradient><filter id="s"><feDropShadow dx="0" dy="22" stdDeviation="24" flood-opacity=".22"/></filter></defs>
  <rect width="1200" height="760" rx="42" fill="url(#bg)"/>
  <g opacity=".10" stroke="#fffaf1"><path d="M0 120H1200M0 240H1200M0 360H1200M0 480H1200M0 600H1200M150 0V760M300 0V760M450 0V760M600 0V760M750 0V760M900 0V760M1050 0V760"/></g>
  <g font-family="Inter, Arial" filter="url(#s)">
    <rect x="82" y="78" width="320" height="230" rx="28" fill="#fffaf1"/><text x="116" y="132" fill="#a66d22" font-size="14" font-weight="900" letter-spacing="4">ADR</text><text x="116" y="178" fill="#111925" font-size="34" font-weight="850">decision records</text><text x="116" y="226" fill="#5f6b79" font-size="22">constraints, tradeoffs, consequences</text>
    <rect x="446" y="78" width="300" height="230" rx="28" fill="#fffaf1"/><text x="480" y="132" fill="#a66d22" font-size="14" font-weight="900" letter-spacing="4">TESTS</text><text x="480" y="178" fill="#111925" font-size="46" font-weight="900">43</text><text x="480" y="226" fill="#5f6b79" font-size="22">public passing checks</text>
    <rect x="790" y="78" width="328" height="230" rx="28" fill="#fffaf1"/><text x="824" y="132" fill="#a66d22" font-size="14" font-weight="900" letter-spacing="4">OUTPUTS</text><text x="824" y="178" fill="#111925" font-size="34" font-weight="850">demos + packets</text><text x="824" y="226" fill="#5f6b79" font-size="22">reviewable surfaces</text>
    <rect x="138" y="386" width="392" height="240" rx="30" fill="#fffaf1"/><text x="172" y="442" fill="#a66d22" font-size="14" font-weight="900" letter-spacing="4">BOUNDARY</text><text x="172" y="490" fill="#111925" font-size="32" font-weight="850">what not to automate blindly</text><text x="172" y="542" fill="#5f6b79" font-size="22">risk flags, caution states, source limits</text>
    <rect x="590" y="386" width="472" height="240" rx="30" fill="#fffaf1"/><text x="624" y="442" fill="#a66d22" font-size="14" font-weight="900" letter-spacing="4">DELIVERY</text><text x="624" y="490" fill="#111925" font-size="32" font-weight="850">proof that travels without private code</text><text x="624" y="542" fill="#5f6b79" font-size="22">case studies, CI, coverage, artifacts</text>
  </g>
</svg>
