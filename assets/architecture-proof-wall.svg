<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Architecture evidence wall</title>
  <desc id="desc">A high-contrast wall of public evidence: ADRs, tests, coverage, demos, boundaries, and review packets.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111c"/><stop offset=".52" stop-color="#10263c"/><stop offset="1" stop-color="#0f4b4a"/></linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fbfdf8"/><stop offset="1" stop-color="#e8f2f4"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#000" flood-opacity=".32"/></filter>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse"><path d="M64 0H0v64" fill="none" stroke="#fff" stroke-opacity=".055"/></pattern>
  </defs>
  <rect width="1400" height="820" rx="48" fill="url(#bg)"/>
  <rect x="30" y="30" width="1340" height="760" rx="38" fill="url(#grid)"/>
  <text x="84" y="98" fill="#6fffe8" font-family="Inter, Arial" font-size="16" font-weight="950" letter-spacing="5">PUBLIC EVIDENCE WALL</text>
  <text x="84" y="150" fill="#f8fbff" font-family="Inter, Arial" font-size="50" font-weight="900">Architecture with receipts.</text>
  <g font-family="Inter, Arial" filter="url(#shadow)">
    <g transform="translate(84 214)"><rect width="370" height="214" rx="30" fill="url(#card)"/><text x="30" y="54" fill="#c36b1e" font-size="14" font-weight="950" letter-spacing="4">DECISIONS</text><text x="30" y="104" fill="#07111c" font-size="34" font-weight="900">ADR-backed</text><text x="30" y="142" fill="#07111c" font-size="34" font-weight="900">tradeoffs</text><path d="M32 174h280" stroke="#0d5f72" stroke-opacity=".22" stroke-width="12" stroke-linecap="round"/></g>
    <g transform="translate(500 214)"><rect width="272" height="214" rx="30" fill="url(#card)"/><text x="30" y="54" fill="#c36b1e" font-size="14" font-weight="950" letter-spacing="4">TESTS</text><text x="30" y="130" fill="#07111c" font-size="78" font-weight="950">43</text><text x="30" y="172" fill="#526170" font-size="22">passing checks</text></g>
    <g transform="translate(816 214)"><rect width="500" height="214" rx="30" fill="url(#card)"/><text x="30" y="54" fill="#c36b1e" font-size="14" font-weight="950" letter-spacing="4">VALIDATION</text><text x="30" y="104" fill="#07111c" font-size="34" font-weight="900">untrusted input</text><text x="30" y="142" fill="#07111c" font-size="34" font-weight="900">meets gates</text><g transform="translate(32 170)" stroke-width="8" stroke-linecap="round"><path d="M0 0h74" stroke="#14b8a6"/><path d="M104 0h74" stroke="#c36b1e"/><path d="M208 0h74" stroke="#2f6bff"/><path d="M312 0h118" stroke="#14b8a6"/></g></g>
    <g transform="translate(84 502)"><rect width="580" height="214" rx="30" fill="url(#card)"/><text x="30" y="54" fill="#c36b1e" font-size="14" font-weight="950" letter-spacing="4">BOUNDARIES</text><text x="30" y="104" fill="#07111c" font-size="32" font-weight="900">what the system refuses</text><text x="30" y="142" fill="#07111c" font-size="32" font-weight="900">to overstate</text><text x="30" y="180" fill="#526170" font-size="20">risk flags · caution states · source limits</text></g>
    <g transform="translate(704 502)"><rect width="612" height="214" rx="30" fill="url(#card)"/><text x="30" y="54" fill="#c36b1e" font-size="14" font-weight="950" letter-spacing="4">DELIVERY</text><text x="30" y="104" fill="#07111c" font-size="32" font-weight="900">public review packets</text><text x="30" y="142" fill="#07111c" font-size="32" font-weight="900">and inspectable artifacts</text><text x="30" y="180" fill="#526170" font-size="20">case studies · CI · coverage · sample outputs</text></g>
  </g>
</svg>
