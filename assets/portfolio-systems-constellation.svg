<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Product systems control map</title>
  <desc id="desc">A high-contrast product systems map showing inputs, product surface, operating logic, review gates, and proof artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#07111c"/><stop offset=".52" stop-color="#0b263c"/><stop offset="1" stop-color="#0f4b4a"/></linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fcfd"/><stop offset="1" stop-color="#e3f2f5"/></linearGradient>
    <linearGradient id="rail" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#6fffe8"/><stop offset=".5" stop-color="#2f6bff"/><stop offset="1" stop-color="#c36b1e"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#000" flood-opacity=".34"/></filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse"><path d="M56 0H0v56" fill="none" stroke="#fff" stroke-opacity=".055"/></pattern>
  </defs>
  <rect width="1400" height="820" rx="48" fill="url(#bg)"/>
  <rect x="30" y="30" width="1340" height="760" rx="38" fill="url(#grid)"/>
  <circle cx="1160" cy="130" r="150" fill="#6fffe8" opacity=".10"/>
  <circle cx="216" cy="650" r="190" fill="#2f6bff" opacity=".12"/>
  <text x="80" y="96" fill="#6fffe8" font-family="Inter, Arial" font-size="16" font-weight="950" letter-spacing="5">PRODUCT SYSTEM MAP</text>
  <text x="80" y="150" fill="#f8fbff" font-family="Inter, Arial" font-size="52" font-weight="900">Interfaces, rules, review, proof.</text>
  <rect x="84" y="232" width="1232" height="84" rx="42" fill="#07111c" stroke="#6fffe8" stroke-opacity=".22"/>
  <rect x="124" y="271" width="1112" height="6" rx="3" fill="url(#rail)"/>
  <g font-family="Inter, Arial" filter="url(#shadow)">
    <g transform="translate(100 378)">
      <rect width="276" height="230" rx="32" fill="url(#panel)"/>
      <rect x="26" y="26" width="56" height="56" rx="18" fill="#dcfdf7"/><text x="54" y="62" text-anchor="middle" font-size="20" font-weight="950" fill="#0f766e">01</text>
      <text x="28" y="112" fill="#c36b1e" font-size="13" font-weight="950" letter-spacing="4">SURFACE</text>
      <text x="28" y="158" fill="#07111c" font-size="34" font-weight="900">Product UX</text>
      <text x="28" y="194" fill="#526170" font-size="20">mobile flows · demos</text>
    </g>
    <g transform="translate(418 378)">
      <rect width="276" height="230" rx="32" fill="url(#panel)"/>
      <rect x="26" y="26" width="56" height="56" rx="18" fill="#e4edff"/><text x="54" y="62" text-anchor="middle" font-size="20" font-weight="950" fill="#2f6bff">02</text>
      <text x="28" y="112" fill="#c36b1e" font-size="13" font-weight="950" letter-spacing="4">RULES</text>
      <text x="28" y="158" fill="#07111c" font-size="34" font-weight="900">Decision logic</text>
      <text x="28" y="194" fill="#526170" font-size="20">ranking · scoring</text>
    </g>
    <g transform="translate(736 378)">
      <rect width="276" height="230" rx="32" fill="url(#panel)"/>
      <rect x="26" y="26" width="56" height="56" rx="18" fill="#fff1d9"/><text x="54" y="62" text-anchor="middle" font-size="20" font-weight="950" fill="#c36b1e">03</text>
      <text x="28" y="112" fill="#c36b1e" font-size="13" font-weight="950" letter-spacing="4">REVIEW</text>
      <text x="28" y="158" fill="#07111c" font-size="34" font-weight="900">Guardrails</text>
      <text x="28" y="194" fill="#526170" font-size="20">queues · source states</text>
    </g>
    <g transform="translate(1054 378)">
      <rect width="246" height="230" rx="32" fill="url(#panel)"/>
      <rect x="26" y="26" width="56" height="56" rx="18" fill="#dcfdf7"/><text x="54" y="62" text-anchor="middle" font-size="20" font-weight="950" fill="#0f766e">04</text>
      <text x="28" y="112" fill="#c36b1e" font-size="13" font-weight="950" letter-spacing="4">PROOF</text>
      <text x="28" y="158" fill="#07111c" font-size="34" font-weight="900">Artifacts</text>
      <text x="28" y="194" fill="#526170" font-size="20">tests · packets · CI</text>
    </g>
  </g>
  <g font-family="Inter, Arial" fill="#f8fbff">
    <text x="124" y="260" font-size="18" font-weight="900">messy inputs</text>
    <text x="422" y="260" font-size="18" font-weight="900">structured states</text>
    <text x="742" y="260" font-size="18" font-weight="900">validation gates</text>
    <text x="1058" y="260" font-size="18" font-weight="900">readable output</text>
  </g>
  <text x="80" y="720" fill="#b7c7d0" font-family="Inter, Arial" font-size="22">The visible work is the interface. The durable work is the operating logic behind it.</text>
</svg>
