<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Product systems constellation</title>
  <desc id="desc">A visual map connecting product surfaces, operating logic, review workflows, and proof artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fffaf1"/><stop offset="1" stop-color="#e8ddcf"/></linearGradient>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#132f53"/><stop offset="1" stop-color="#1f6f68"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#111925" flood-opacity="0.16"/></filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0v48" fill="none" stroke="#132f53" stroke-opacity=".08"/></pattern>
  </defs>
  <rect width="1200" height="760" rx="42" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="712" rx="32" fill="url(#grid)"/>
  <circle cx="600" cy="380" r="238" fill="none" stroke="#132f53" stroke-opacity=".18" stroke-dasharray="10 10"/>
  <circle cx="600" cy="380" r="132" fill="url(#navy)" filter="url(#shadow)"/>
  <text x="600" y="362" fill="#fffaf1" font-family="Inter, Arial" font-size="30" font-weight="800" text-anchor="middle">system</text>
  <text x="600" y="402" fill="#fffaf1" font-family="Inter, Arial" font-size="30" font-weight="800" text-anchor="middle">judgment</text>
  <g font-family="Inter, Arial" filter="url(#shadow)">
    <g transform="translate(104 118)"><rect width="310" height="126" rx="26" fill="#fffdf8" stroke="#d7cbbb"/><text x="28" y="48" font-size="15" font-weight="900" fill="#a66d22" letter-spacing="4">SURFACE</text><text x="28" y="86" font-size="28" font-weight="850" fill="#111925">Product UX</text></g>
    <g transform="translate(788 128)"><rect width="310" height="126" rx="26" fill="#fffdf8" stroke="#d7cbbb"/><text x="28" y="48" font-size="15" font-weight="900" fill="#a66d22" letter-spacing="4">LOGIC</text><text x="28" y="86" font-size="28" font-weight="850" fill="#111925">Rules + scoring</text></g>
    <g transform="translate(126 516)"><rect width="330" height="126" rx="26" fill="#fffdf8" stroke="#d7cbbb"/><text x="28" y="48" font-size="15" font-weight="900" fill="#a66d22" letter-spacing="4">REVIEW</text><text x="28" y="86" font-size="28" font-weight="850" fill="#111925">Guardrails</text></g>
    <g transform="translate(754 514)"><rect width="340" height="126" rx="26" fill="#fffdf8" stroke="#d7cbbb"/><text x="28" y="48" font-size="15" font-weight="900" fill="#a66d22" letter-spacing="4">PROOF</text><text x="28" y="86" font-size="28" font-weight="850" fill="#111925">Tests + artifacts</text></g>
  </g>
  <g stroke="#1f6f68" stroke-width="4" stroke-linecap="round" opacity=".62"><path d="M412 196C486 222 529 272 572 310"/><path d="M790 198C714 228 674 276 632 310"/><path d="M440 558C504 500 545 456 579 430"/><path d="M760 556C702 500 662 456 628 430"/></g>
  <g fill="#a66d22"><circle cx="416" cy="197" r="7"/><circle cx="790" cy="198" r="7"/><circle cx="440" cy="558" r="7"/><circle cx="760" cy="556" r="7"/></g>
</svg>
